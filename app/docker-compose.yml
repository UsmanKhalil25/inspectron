version: "3.9"

services:
  postgres:
    image: postgres:15-alpine
    container_name: inspectron-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: inspectron
      POSTGRES_PASSWORD: supersecurepassword
      POSTGRES_DB: inspectron_dev
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - inspectron-net

  redis:
    image: redis:alpine
    container_name: inspectron-redis
    restart: unless-stopped
    environment:
      REDIS_PASSWORD: supersecurepassword
    command: ["redis-server", "--requirepass", "supersecurepassword"]
    ports:
      - "6379:6379"
    networks:
      - inspectron-net

volumes:
  postgres_data:

networks:
  inspectron-net:
    driver: bridge
